<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--ink:#0A0F1E;--cobalt:#1A3BAD;--cobalt-gl:#4A70F5;--canvas:#F4F6FB;--surface:#fff;--rule:#E2E6F2;--t1:#0A0F1E;--t2:#3A4268;--t3:#7A82A8;--t4:#A8B0CC}
body{font-family:'DM Sans',sans-serif;background:var(--canvas);color:var(--t1);font-size:14px;-webkit-font-smoothing:antialiased;margin:0;padding:0}
.cover{background:var(--ink);min-height:130px;position:relative;overflow:hidden}
.cg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:52px 52px}
.cgl{position:absolute;top:-60px;right:-40px;width:400px;height:400px;background:radial-gradient(ellipse,rgba(41,82,227,.18) 0%,transparent 65%)}
.cover-in{position:relative;max-width:1100px;margin:0 auto;padding:20px 28px 16px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px}
.b3w{font-size:18px;font-weight:600;color:#fff}.b3w em{font-style:normal;color:var(--cobalt-gl)}
.ct{font-family:'Playfair Display',serif;font-size:22px;font-weight:600;color:#fff}
.cs{font-size:11px;color:rgba(255,255,255,.4);margin-top:3px}
.cover-rule{height:1px;background:linear-gradient(90deg,transparent,rgba(74,112,245,.4),transparent)}
.page{max-width:1100px;margin:0 auto;padding:20px 28px 60px;min-height:calc(100vh - 130px)}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--rule)}
.st{font-size:13px;font-weight:600;color:var(--t1)}.ss{font-size:11px;color:var(--t3);margin-left:auto}
.hgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px}
@media(max-width:700px){.hgrid{grid-template-columns:1fr}}
.hcard{background:var(--surface);border:1px solid var(--rule);border-radius:14px;padding:18px;cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .3s,box-shadow .3s;position:relative;overflow:hidden}
.hcard.meta-atingida{border-color:rgba(250,204,21,.5);animation:hcard-pulse 2.5s ease-in-out infinite;}
@keyframes hcard-pulse{0%,100%{box-shadow:0 0 0 0 rgba(250,204,21,.0),var(--sh);}50%{box-shadow:0 0 24px 4px rgba(250,204,21,.18),var(--sh);}}
.hcard-crown{position:absolute;top:-18px;left:50%;transform:translateX(-50%) scale(0);font-size:20px;transition:top .5s cubic-bezier(.175,.885,.32,1.275),transform .5s cubic-bezier(.175,.885,.32,1.275);pointer-events:none;z-index:2;}
.hcard.meta-atingida .hcard-crown{top:-10px;transform:translateX(-50%) scale(1);}
.hcard-meta-badge{display:none;align-items:center;justify-content:center;gap:5px;margin-top:10px;padding:6px 12px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);border-radius:20px;font-size:10px;font-weight:700;color:#FCD34D;letter-spacing:.04em;}
.hcard.meta-atingida .hcard-meta-badge{display:flex;}
.hcard-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;opacity:0;transition:opacity .3s;}
.hcard.meta-atingida .hcard-particles{opacity:1;}
.hparticle{position:absolute;width:4px;height:4px;border-radius:50%;animation:hpart-up 3s ease-in-out infinite;}
@keyframes hpart-up{0%{transform:translateY(100%) scale(0);opacity:0;}20%{opacity:1;}80%{opacity:.7;}100%{transform:translateY(-160px) scale(1);opacity:0;}}
.hcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(10,15,30,.1)}
.hcard-top{height:3px;border-radius:14px 14px 0 0;position:absolute;top:0;left:0;right:0}
.hcard-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:var(--t1);margin-bottom:2px;margin-top:4px}
.hcard-sub{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--t4);margin-bottom:14px}
.hs{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--rule);font-size:12px}
.hs:last-child{border-bottom:none}
.hl{color:var(--t3)}.hv{font-weight:700;color:var(--t1)}
.pace-bar{height:6px;background:var(--rule);border-radius:3px;margin-top:12px;overflow:hidden}
.pace-fill{height:100%;border-radius:3px;transition:width .6s ease}
.pace-lbl{display:flex;justify-content:space-between;font-size:10px;color:var(--t3);margin-top:4px}
.rank-box{background:var(--surface);border:1px solid var(--rule);border-radius:14px;padding:16px 18px;margin-bottom:16px}
.rank-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.rrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.rrow:last-child{margin-bottom:0}
.rn{font-size:11px;font-weight:700;color:var(--t4);width:20px;text-align:center}
.rname{font-size:13px;font-weight:600;color:var(--t1);width:76px}
.rtrack{flex:1;height:22px;background:var(--canvas);border-radius:5px;overflow:hidden}
.rfill{height:100%;border-radius:5px;display:flex;align-items:center;padding-left:8px}
.rval-lbl{font-size:10px;font-weight:700;color:#fff;white-space:nowrap}
.rval{font-size:12px;font-weight:700;color:var(--t1);width:90px;text-align:right}
/* detail */
.back-btn{background:var(--surface);border:1px solid var(--rule);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;display:inline-flex;align-items:center;gap:6px;margin-bottom:16px}
.back-btn:hover{background:var(--canvas)}
.krow{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:700px){.krow{grid-template-columns:repeat(2,1fr)}}
.kc{background:var(--surface);border:1px solid var(--rule);border-radius:12px;padding:13px 15px}
.kl{font-size:9px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--t3);margin-bottom:5px}
.kv{font-family:'Playfair Display',serif;font-size:20px;font-weight:600;color:var(--t1);line-height:1}
.ks{font-size:10px;color:var(--t3);margin-top:3px}
.mou-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.mou-box{flex:1;padding:12px 14px;border-radius:10px}
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--rule)}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
thead th{background:var(--ink);color:rgba(255,255,255,.5);padding:8px 11px;text-align:right;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
thead th:first-child{text-align:left}
tbody tr{border-bottom:1px solid var(--rule)}
tbody tr:last-child{border-bottom:none}
tbody tr:hover td{background:#F0F4FF}
tbody tr:nth-child(even) td{background:#FAFBFE}
tbody td{padding:8px 11px;text-align:right;color:var(--t2)}
tbody td:first-child{text-align:left;font-weight:600;color:var(--t1)}
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.bg-g{background:#DCFCE7;color:#15803D}.bg-b{background:#EEF2FD;color:#1A3BAD}.bg-a{background:#FEF3C7;color:#92400E}
.bd{width:5px;height:5px;border-radius:50%;background:currentColor}
</style><script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

<script>
/**
 * pipeline.js — Blue3 Expansion Suite v4
 * Fonte de verdade: parse + cálculo + localStorage
 * NÃO roda automaticamente — aguarda chamada explícita
 * Nunca persistir window.Blue3Data no localStorage
 */

// ── Objeto global (sempre recriado, nunca persistido) ──
window.Blue3Data = null;
window.Blue3Ready = false;

// ── Utilitários ──

/** Normaliza string para comparação case-insensitive sem espaços */
function norm(s) {
  return String(s || '').trim().toLowerCase();
}

/** Parseia moeda brasileira: "R$ 10.000,00" → 10000 */
function pn(v) {
  var s = String(v || '0').replace(/R\$|\s/g, '').replace(/\./g, '').replace(',', '.').trim();
  return parseFloat(s) || 0;
}

/** Extrai mês de string de data (dd/mm/yyyy ou yyyy-mm-dd) */
function getMonth(dtStr) {
  if (!dtStr) return null;
  var p = dtStr.split('/');
  if (p.length === 3) return parseInt(p[1]);
  var p2 = dtStr.split('-');
  return p2.length >= 2 ? parseInt(p2[1]) : null;
}

/** Extrai ano de string de data (dd/mm/yyyy ou yyyy-mm-dd) */
function getYear(dtStr) {
  if (!dtStr) return null;
  var p = dtStr.split('/');
  if (p.length === 3) return parseInt(p[2]);
  var p2 = dtStr.split('-');
  return p2.length >= 2 ? parseInt(p2[0]) : null;
}

/** Formata número para moeda BRL */
function fmtBRL(v) {
  if (!v || v === 0) return '—';
  return 'R$ ' + Math.round(v).toLocaleString('pt-BR');
}

var MES = {
  1: 'Jan', 2: 'Fev', 3: 'Mar', 4: 'Abr',
  5: 'Mai', 6: 'Jun', 7: 'Jul', 8: 'Ago',
  9: 'Set', 10: 'Out', 11: 'Nov', 12: 'Dez'
};

// ── Chart registry — evita duplicação ──
var _chartReg = {};

function safeChart(id, cfg) {
  if (_chartReg[id]) {
    try { _chartReg[id].destroy(); } catch (e) {}
    delete _chartReg[id];
  }
  var el = document.getElementById(id);
  if (!el) {
    console.warn('[Blue3] canvas não encontrado:', id);
    return null;
  }

  // Verificar se há dados válidos
  var hasData = cfg.data && cfg.data.datasets && cfg.data.datasets.some(function (d) {
    return d.data && d.data.some(function (v) { return v != null && v > 0; });
  });

  if (!hasData) {
    var wrapper = el.parentElement;
    if (wrapper) {
      wrapper.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;'
        + 'height:100%;min-height:120px;color:var(--t3);font-size:12px;font-style:italic;">'
        + 'Dados insuficientes para gerar gráfico</div>';
    }
    console.warn('[Blue3] Dados insuficientes para:', id);
    return null;
  }

  try {
    _chartReg[id] = new Chart(el, cfg);
    return _chartReg[id];
  } catch (e) {
    console.error('[Blue3] Erro no chart', id, e);
    return null;
  }
}

/** Estado vazio padrão */
function showEmptyState(msg) {
  var el = document.getElementById('content') || document.body;
  el.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;'
    + 'justify-content:center;height:60vh;gap:16px;">'
    + '<div style="font-size:48px;">📊</div>'
    + '<div style="font-size:16px;font-weight:600;color:var(--t1);">Sem dados carregados</div>'
    + '<div style="font-size:13px;color:var(--t3);">'
    + (msg || 'Acesse a tela inicial e faça o upload do CSV para continuar.')
    + '</div>'
    + '<a href="index.html" style="padding:10px 24px;background:var(--cobalt);color:#fff;'
    + 'border-radius:8px;text-decoration:none;font-size:13px;font-weight:600;">Ir para a home</a>'
    + '</div>';
}

// ────────────────────────────────────────────────────────────
// MÓDULO 1 — dataLoader
// ────────────────────────────────────────────────────────────
function Blue3_dataLoader() {
  console.log('[Blue3] dataLoader iniciado...');
  var raw = localStorage.getItem('B3D');
  if (!raw) {
    console.warn('[Blue3] B3D não encontrado no localStorage');
    return false;
  }
  var rows;
  try {
    rows = JSON.parse(raw);
  } catch (e) {
    console.error('[Blue3] JSON inválido em B3D:', e);
    return false;
  }
  if (!Array.isArray(rows) || !rows.length) {
    console.warn('[Blue3] B3D vazio');
    return false;
  }

  window.Blue3Data.candidatos = rows.map(function (r) {
    return {
      n:       (r['Candidato'] || '').trim(),
      p:       (r['Filial'] || '').trim(),
      h:       (r['Hunter'] || '').trim(),
      sen:     (r['Senioridade'] || '').trim(),
      org:     (r['Origem'] || '').trim(),
      mou:     (r['MOU'] || '').trim(),
      st:      (r['Status'] || '').trim(),
      ancord:  (r['Ancord'] || '').trim(),
      piso:    pn(r['Piso']),
      si:      pn(r['Sign in']),
      xp:      pn(r['Detalhe Coparticipação']),
      comp:    pn(r['Total Comp.']),
      cap:     Math.round(pn(r['Total Captação (MM)']) / 1e6),
      periodo: Math.round(parseFloat(String(r['Período'] || '12').replace(',', '.')) || 12),
      trigs: [
        pn(r['Trigger 1 Tri']),
        pn(r['Trigger 1']),
        pn(r['Trigger 2']),
        pn(r['Trigger 3']),
        pn(r['Trigger 4']),
      ],
      dt:     (r['Data de Contratação'] || null),
      inicio: (r['Prev. Inicio'] || null),
    };
  }).filter(function (r) {
    var st = norm(r.st);
    return r.n && (st === 'trabalhando' || st === 'contratado(a)');
  });

  if (!window.Blue3Data.candidatos.length) {
    console.error('[Blue3] Nenhum candidato válido após filtro');
    return false;
  }
  console.log('[Blue3] candidatos carregados:', window.Blue3Data.candidatos.length);
  return true;
}

// ────────────────────────────────────────────────────────────
// MÓDULO 2 — financeMetrics
// ────────────────────────────────────────────────────────────
function Blue3_financeMetrics() {
  var C = window.Blue3Data.candidatos;
  var TRIG_MONTHS = [3, 6, 12, 18, 24];

  window.Blue3Data.financeiros = C.map(function (r) {
    var pisoTotal = r.piso * r.periodo;
    var trigTotal = r.trigs.reduce(function (s, t) { return s + t; }, 0);
    var custoTotal = pisoTotal + r.si + trigTotal;
    var trigMap = {};
    TRIG_MONTHS.forEach(function (m, i) {
      if (r.trigs[i] > 0) trigMap[m] = (trigMap[m] || 0) + r.trigs[i];
    });
    return {
      n: r.n, p: r.p, h: r.h, sen: r.sen, mou: r.mou, st: r.st,
      piso: r.piso, periodo: r.periodo, si: r.si, xp: r.xp,
      comp: r.comp, cap: r.cap,
      pisoTotal:  Math.round(pisoTotal),
      trigTotal:  Math.round(trigTotal),
      custoTotal: Math.round(custoTotal),
      trigMap:    trigMap,
      ativo:      !!r.inicio,
      inicio:     r.inicio,
      dt:         r.dt,
      org:        r.org,
      ancord:     r.ancord,
    };
  });

  // resumoGeral
  var F = window.Blue3Data.financeiros;
  var byMonth = {}, senByMonth = {};
  F.forEach(function (r) {
    var mo = getMonth(r.dt);
    if (mo) {
      byMonth[mo] = (byMonth[mo] || 0) + 1;
      if (norm(r.sen) === 'sênior') senByMonth[mo] = (senByMonth[mo] || 0) + 1;
    }
  });

  var AT = F.length;
  var seniors = F.filter(function (r) { return norm(r.sen) === 'sênior'; });
  var pracasSet = {};
  F.forEach(function (r) { if (r.p) pracasSet[r.p] = 1; });
  var maiorCand = F.length > 0 ? F.reduce(function (a, b) { return b.cap > a.cap ? b : a; }) : null;

  window.Blue3Data.resumoGeral = {
    total:      AT,
    trab:       F.filter(function (r) { return norm(r.st) === 'trabalhando'; }).length,
    contCount:  F.filter(function (r) { return norm(r.st) === 'contratado(a)'; }).length,
    mouOk:      F.filter(function (r) { return norm(r.mou) === 'assinado'; }).length,
    mouPend:    F.filter(function (r) { return norm(r.mou) === 'pendente'; }).length,
    ancord:     F.filter(function (r) { return norm(r.ancord) === 'sim'; }).length,
    aucTotal:   F.reduce(function (s, r) { return s + r.cap; }, 0),
    compTotal:  F.reduce(function (s, r) { return s + r.comp; }, 0),
    siTotal:    F.reduce(function (s, r) { return s + r.si; }, 0),
    xpTotal:    F.reduce(function (s, r) { return s + r.xp; }, 0),
    blue3Liq:   F.reduce(function (s, r) { return s + r.comp; }, 0) - F.reduce(function (s, r) { return s + r.xp; }, 0),
    siCount:    F.filter(function (r) { return r.si > 0; }).length,
    seniors:    seniors.length,
    plenos:     F.filter(function (r) { return norm(r.sen) === 'pleno'; }).length,
    juniors:    F.filter(function (r) { return norm(r.sen) === 'junior' || norm(r.sen) === 'júnior'; }).length,
    seniorPct:  AT > 0 ? Math.round(seniors.length / AT * 100) : 0,
    pracas:     Object.keys(pracasSet).length,
    brutas:     AT + 3,
    maiorCand:  maiorCand,
    byMonth:    byMonth,
    senByMonth: senByMonth,
    aucB:       (F.reduce(function (s, r) { return s + r.cap; }, 0) / 1000).toFixed(2).replace('.', ','),
  };

  console.log('[Blue3] financeMetrics:', {
    total: window.Blue3Data.resumoGeral.total,
    trab: window.Blue3Data.resumoGeral.trab,
    contCount: window.Blue3Data.resumoGeral.contCount,

    return { n: r.n, receita: receita, mesPayback: mesPayback };
  });

// ────────────────────────────────────────────────────────────
// UPLOAD CSV — Parser com auto-detecção de separador
// ────────────────────────────────────────────────────────────
function b3ImportCSV(input) {
  var file = input.files[0];
  if (!file) return;
  var rd = new FileReader();
  rd.onload = function (e) {
    try {
      var text = e.target.result;
      // Remover BOM se presente
      if (text.charCodeAt(0) === 0xFEFF) text = text.slice(1);

      var lines = text.split('\n').filter(function (l) { return l.trim(); });
      if (lines.length < 2) { alert('CSV inválido — menos de 2 linhas.'); return; }

      // Auto-detectar separador
      var sep = lines[0].indexOf(';') > -1 ? ';' : ',';

      // Parse headers (remove BOM e espaços)
      var h = lines[0].split(sep).map(function (x) {
        return x.trim().replace(/^\uFEFF/, '').replace(/^"|"$/g, '');
      });

      // Parse rows
      var rows = [];
      for (var i = 1; i < lines.length; i++) {
        var line = lines[i];
        if (!line.trim()) continue;
        var v = line.split(sep);
        var o = {};
        h.forEach(function (hh, j) {
          o[hh] = (v[j] || '').trim().replace(/^"|"$/g, '');
        });
        // Filtrar linhas com candidato e status válido
        var cand = (o['Candidato'] || '').trim();
        var st = (o['Status'] || '').trim();
        if (cand && (st === 'Trabalhando' || st === 'Contratado(a)')) {
          rows.push(o);
        }
      }

      if (!rows.length) {
        alert('Nenhum candidato válido encontrado.\nVerifique se o CSV possui colunas "Candidato" e "Status".');
        return;
      }

      // Salvar e disparar pipeline
      localStorage.setItem('B3D', JSON.stringify(rows));
      console.log('[Blue3] CSV importado:', rows.length, 'candidatos');
      if (window.b3OnCSVLoaded) window.b3OnCSVLoaded();
      alert('✅ Base atualizada: ' + rows.length + ' candidatos carregados.');
    } catch (err) {
      console.error('[Blue3] Erro no CSV:', err);
      alert('Erro ao importar CSV: ' + err.message);
    }
    input.value = '';
  };
  rd.readAsText(file, 'UTF-8');
}

        particles+='<div class="hparticle" style="left:'+(Math.random()*100)+'%;bottom:'+(Math.random()*20)+'px;background:'+pColors[pi%pColors.length]+';animation-delay:'+(Math.random()*2)+'s;animation-duration:'+(2+Math.random()*1.5)+'s;"></div>';
      }
    }
    particles+='</div>';
    var nomeEsc=hun.nome.replace(/'/g,"&#39;");
    return '<div class="'+cardCls+'" onclick="showDet(&#39;'+nomeEsc+'&#39;)">'
      +crown+particles
      +'<div class="hcard-top" style="background:'+hun.color+'"></div>'
      +'<div class="hcard-name">'+hun.nome+'</div>'
      +'<div class="hcard-sub">Hunter &middot; Expans&atilde;o 1S2026</div>'
      +'<div class="hs"><span class="hl">Contrata&ccedil;&otilde;es</span><span class="hv">'+hun.total+'/'+hun.meta+'</span></div>'
      +'<div class="hs"><span class="hl">AuC Alvo</span><span class="hv">'+fmt(hun.auc)+'</span></div>'
      +'<div class="hs"><span class="hl">Comp. Gerada</span><span class="hv">'+fmt(hun.comp)+'</span></div>'
      +'<div class="hs"><span class="hl">MOU OK</span><span class="hv">'+hun.mou_ok+'/'+hun.total+'</span></div>'
      +'<div class="hs"><span class="hl">Trabalhando</span><span class="hv">'+hun.trabalhando+'</span></div>'
      +'<div class="pace-bar"><div class="pace-fill" style="width:'+Math.min(pc,100)+'%;background:'+pcC+'"></div></div>'
      +'<div class="pace-lbl"><span>Pace vs meta</span><span style="font-weight:700;color:'+pcC+'">'+pc+'%</span></div>'
      +badge+'</div>';
  }).join('');
  rank('r-auc',function(h){return h.auc;},fmt);
  // Disparar confetes para hunters que bateram a meta
  setTimeout(function(){
    H.forEach(function(h){
      if(h.total >= h.meta){
        var card = document.querySelector('.hcard.meta-atingida');
        if(!card) return;
        var cards = document.querySelectorAll('.hcard.meta-atingida');
        cards.forEach(function(card){
          var rect = card.getBoundingClientRect();
          var cx = (rect.left + rect.width/2) / window.innerWidth;
          var cy = (rect.top + rect.height/2) / window.innerHeight;
          if(typeof confetti === 'function'){
            confetti({particleCount:60,spread:65,origin:{x:cx,y:cy},
              colors:['#FCD34D','#6366F1','#4ADE80','#F472B6','#60A5FA','#fff'],
              scalar:1.0,gravity:0.9});
            setTimeout(function(){
              confetti({particleCount:30,spread:45,origin:{x:cx-0.05,y:cy-0.05},
                colors:['#FCD34D','#fff'],scalar:0.8});
            },350);
          }
        });
      }
    });
  }, 600);
  rank('r-cont',function(h){return h.total;},function(v){return v+' contratos';});
  rank('r-comp',function(h){return h.comp;},fmt);
}

function renderPage(){
  var D=window.Blue3Data;
  if(!window.Blue3Ready||!D||!D.hunters||!D.hunters.length){
    diag('SEM DADOS - va para home e faca upload do CSV');
    showEmptyState();
    return;
  }
  H=buildH(D.hunters,D.candidatos);
  diag('OK: '+H.length+' hunters carregados');
  renderOv();
}

function showEmptyState(msg){
  var el=document.getElementById('view-ov');if(!el)return;
  el.innerHTML='<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;padding:40px;text-align:center;">'
    +'<div style="font-size:48px">?</div>'
    +'<div style="font-size:16px;font-weight:600">Sem dados carregados</div>'
    +'<div style="font-size:13px;color:var(--t3);max-width:340px">'+(msg||'Faca o upload do CSV.')+'</div>'
    +'<label style="padding:10px 24px;background:var(--cobalt);color:#fff;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;display:inline-block;">'
    +'Fazer upload do CSV'
    +'<input type="file" accept=".csv" style="display:none" onchange="uploadCSV(this)"></label>'
    +'<a href="index.html" style="font-size:12px;color:var(--t3);">ou ir para a home</a>'
    +'</div>';
}

function uploadCSV(input){
  var file=input.files[0];if(!file)return;
  var rd=new FileReader();
  rd.onload=function(e){
    try{
      var text=e.target.result;
      if(text.charCodeAt(0)===0xFEFF)text=text.slice(1);
      var lines=text.split('\n').filter(function(l){return l.trim();});
      var sep=lines[0].indexOf(';')>-1?';':',';
      var hh=lines[0].split(sep).map(function(x){return x.trim().replace(/^"|"$/g,'');});
      var rows=[];
      for(var i=1;i<lines.length;i++){
        if(!lines[i].trim())continue;
        var v=lines[i].split(sep),o={};
        hh.forEach(function(k,j){o[k]=(v[j]||'').trim().replace(/^"|"$/g,'');});
        var st=(o['Status']||'').trim();
        if(o['Candidato']&&(st==='Trabalhando'||st==='Contratado(a)'))rows.push(o);
      }
      if(!rows.length){alert('Nenhum candidato valido no CSV.');return;}
      localStorage.setItem('B3D',JSON.stringify(rows));
      diag('CSV carregado: '+rows.length+' candidatos');
      if(Blue3_runPipeline())renderPage();
    }catch(err){alert('Erro: '+err.message);}
    input.value='';
  };
  rd.readAsText(file,'UTF-8');
}

document.addEventListener('DOMContentLoaded',function(){
  diag('Iniciando hunters...');
  var raw=localStorage.getItem('B3D');
  if(!raw){showEmptyState();diag('CSV nao encontrado - faca upload acima');return;}
  var ok=Blue3_runPipeline();
  if(ok){renderPage();}
  else{showEmptyState('Pipeline falhou. Faca o upload do CSV novamente.');}
});

window.b3OnCSVLoaded=function(){if(Blue3_runPipeline())renderPage();};
